name: Deploy Payment Service Labo 5

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Payment Service
        run: |
          set -e

          DEPLOY_DIR="/home/runner/log430-labo5-deploy/log430-labo5-E26-payment"

          docker network create labo05-network 2>/dev/null || true

          if [ -d "$DEPLOY_DIR" ]; then
            cd "$DEPLOY_DIR"
            docker-compose down --remove-orphans || true
          fi

          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          rsync -a --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            "$GITHUB_WORKSPACE/" "$DEPLOY_DIR/"

          cd "$DEPLOY_DIR"

          cat > .env <<'EOF'
          DB_HOST=mysql_payments
          DB_PORT=3306
          DB_NAME=labo05_payments_db
          DB_USER=labo05
          DB_PASSWORD=labo05
          EOF

          docker-compose up -d --build